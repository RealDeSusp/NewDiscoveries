<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Objects</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f5f5f5;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>Список объектов</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Data</th>
        </tr>
    </thead>

    <tbody>
        {% for obj in objects %}
        <tr>
            <td>{{ obj.id }}</td>
            <td>{{ obj.name }}</td>
            <td>
                <pre>{{ obj.data }}</pre>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
